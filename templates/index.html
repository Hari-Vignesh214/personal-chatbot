<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Personal Chatbot with Memory</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  </head>
  <body>
    <div class="app">
      <header>
        <h1>Personal Chatbot</h1>
        <p class="subtitle">Stateful conversations powered by Gemini · attach docs to teach me things</p>
        <button id="clear-btn" class="clear-btn" type="button">Clear Memory</button>
      </header>

      <main id="chat" class="chat" aria-live="polite"></main>

      <form id="chat-form" class="composer">
        <div id="pending-attachments" class="pending-attachments"></div>
        <div class="composer-row">
          <label class="attach-btn" title="Attach files (PDF, DOCX, text, code)">
            <span aria-hidden="true">📎</span>
            <input type="file" id="file-input" multiple hidden />
          </label>
          <textarea
            id="message"
            placeholder="Ask me anything... attach files to add to memory."
            rows="2"
            autocomplete="off"
          ></textarea>
          <button type="submit" id="send-btn">Send</button>
        </div>
      </form>
    </div>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
  </body>
</html>
